name: Backfill major release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Historical HAOS version from .github/major-targets.json
        required: true
        type: string
      runner_target:
        description: Choose GitHub-hosted or the dedicated self-hosted runner
        required: true
        type: choice
        default: github-hosted
        options:
          - github-hosted
          - self-hosted

jobs:
  validate:
    runs-on: ubuntu-22.04
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout control repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve backfill inputs
        id: release
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          family="$(
            python3 -c 'import json, os; version = os.environ["VERSION"].strip(); targets = json.load(open(".github/major-targets.json", "r", encoding="utf-8"))["historical_targets"]; matches = [item["family"] for item in targets if item["version"] == version]; print(matches[0]) if matches else (_ for _ in ()).throw(SystemExit(f"Unsupported historical target: {version}"))'
          )"

          echo "source_ref=port/${VERSION}" >> "$GITHUB_OUTPUT"
          echo "family=${family}" >> "$GITHUB_OUTPUT"

      - name: Validate source branch exists
        shell: bash
        env:
          SOURCE_REF: ${{ steps.release.outputs.source_ref }}
        run: |
          set -euo pipefail
          git ls-remote --exit-code --heads "https://github.com/${GITHUB_REPOSITORY}.git" "${SOURCE_REF}" >/dev/null

      - name: Dispatch build workflow
        id: dispatch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_REF: ${{ steps.release.outputs.source_ref }}
          RUNNER_TARGET: ${{ inputs.runner_target }}
        run: |
          set -euo pipefail
          dispatched_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          gh workflow run build.yml \
            --ref main \
            -f source_ref="${SOURCE_REF}" \
            -f runner_target="${RUNNER_TARGET}" \
            -f publish_to_release=false

          run_id=""
          for _ in $(seq 1 30); do
            run_id="$(
              gh run list \
                --workflow build.yml \
                --event workflow_dispatch \
                --limit 10 \
                --json databaseId,createdAt \
                --jq "map(select(.createdAt >= \"${dispatched_at}\"))[0].databaseId"
            )"
            if [[ -n "${run_id}" && "${run_id}" != "null" ]]; then
              break
            fi
            sleep 10
          done

          if [[ -z "${run_id}" || "${run_id}" == "null" ]]; then
            echo "Unable to resolve the validation run id." >&2
            exit 1
          fi

          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"

      - name: Wait for validation result
        id: result
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.dispatch.outputs.run_id }}
        run: |
          set -euo pipefail
          if gh run watch "${RUN_ID}" --exit-status; then
            echo "status=validated" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Write summary
        if: always()
        run: |
          {
            echo "# Backfill validation summary"
            echo ""
            echo "- Version: \`${{ inputs.version }}\`"
            echo "- Family: \`${{ steps.release.outputs.family }}\`"
            echo "- Source ref: \`${{ steps.release.outputs.source_ref }}\`"
            echo "- Runner target: \`${{ inputs.runner_target }}\`"
            echo "- Validation run id: \`${{ steps.dispatch.outputs.run_id || 'n/a' }}\`"
            echo "- Validation status: \`${{ steps.result.outputs.status || 'failed' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

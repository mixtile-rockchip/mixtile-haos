name: Sync latest HAOS release

on:
  workflow_dispatch:
  schedule:
    - cron: "25 3 * * *"

jobs:
  check:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          ref: main
          submodules: recursive

      - name: Resolve current and latest release
        id: versions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current_tag="$(git -C haos describe --tags --exact-match 2>/dev/null || true)"
          latest_tag="$(gh api repos/home-assistant/operating-system/releases/latest --jq '.tag_name')"
          echo "current_tag=${current_tag}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"

      - name: Create reminder issue when upstream moved
        if: ${{ steps.versions.outputs.current_tag != steps.versions.outputs.latest_tag }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          CURRENT_TAG: ${{ steps.versions.outputs.current_tag }}
          LATEST_TAG: ${{ steps.versions.outputs.latest_tag }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const latestTag = process.env.LATEST_TAG;
            const title = `Sync HAOS ${latestTag}`;
            const releaseTag = `mixtile-haos-${latestTag}-r1`;
            const body = [
              `Current pinned HAOS tag on \`main\`: \`${process.env.CURRENT_TAG || "unversioned"}\``,
              `Latest upstream HAOS tag: \`${latestTag}\``,
              ``,
              `Required follow-up on \`main\`:`,
              `1. Update the \`haos/\` submodule to \`${latestTag}\`.`,
              `2. Adapt and validate Mixtile Edge 2 on \`main\`.`,
              `3. Run the \`Build Mixtile Edge 2\` workflow with \`git_ref=main\` and \`publish=false\`.`,
              `4. After validation succeeds, run \`Publish validated release\` for \`main\` with \`version=${latestTag}\` and \`revision=1\`.`,
              `5. The published GitHub Release will automatically trigger the release build and upload \`.img.xz\` / \`.raucb\` assets.`,
              ``,
              `This repository only tracks the latest stable HAOS line on \`main\`. Historical major backfills belong on temporary \`port/<version>\` branches.`,
            ].join("\n");

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            if (issues.some((issue) => issue.title === title)) {
              core.notice(`Issue already open: ${title}`);
              return;
            }

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
            });

      - name: Write summary
        run: |
          {
            echo "# HAOS release check"
            echo ""
            echo "- Default line: \`main\`"
            echo "- Pinned tag on main: \`${{ steps.versions.outputs.current_tag || 'unversioned' }}\`"
            echo "- Latest upstream tag: \`${{ steps.versions.outputs.latest_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

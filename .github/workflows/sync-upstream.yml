name: Sync latest HAOS release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Override upstream HAOS version to sync; empty means latest stable release
        required: false
        type: string
        default: ""
      force:
        description: Force regenerating the sync/<version> branch and validate run even when main is already pinned there
        required: true
        type: boolean
        default: false
  schedule:
    - cron: "25 3 * * *"

jobs:
  sync:
    runs-on: ubuntu-22.04
    permissions:
      actions: write
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
          submodules: recursive

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve current and target versions
        id: versions
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
          FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail

          git -C haos fetch --tags --force origin

          current_tag="$(git -C haos describe --tags --exact-match 2>/dev/null || true)"
          if [[ -n "${INPUT_VERSION}" ]]; then
            target_tag="${INPUT_VERSION}"
          else
            target_tag="$(gh api repos/home-assistant/operating-system/releases/latest --jq '.tag_name')"
          fi

          if [[ ! "${target_tag}" =~ ^[0-9]+\.[0-9]+$ ]]; then
            echo "Only stable HAOS releases are supported for sync: ${target_tag}." >&2
            exit 1
          fi

          should_sync="false"
          if [[ "${FORCE}" == "true" || "${current_tag}" != "${target_tag}" ]]; then
            should_sync="true"
          fi

          echo "current_tag=${current_tag}" >> "$GITHUB_OUTPUT"
          echo "target_tag=${target_tag}" >> "$GITHUB_OUTPUT"
          echo "sync_branch=sync/${target_tag}" >> "$GITHUB_OUTPUT"
          echo "should_sync=${should_sync}" >> "$GITHUB_OUTPUT"

      - name: Prepare sync branch
        if: ${{ steps.versions.outputs.should_sync == 'true' }}
        id: branch
        shell: bash
        env:
          TARGET_TAG: ${{ steps.versions.outputs.target_tag }}
          SYNC_BRANCH: ${{ steps.versions.outputs.sync_branch }}
        run: |
          set -euo pipefail

          git switch -C "${SYNC_BRANCH}" main
          git -C haos fetch --tags --force origin
          git -C haos checkout "${TARGET_TAG}"
          git add haos

          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Sync HAOS ${TARGET_TAG}"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push sync branch
        if: ${{ steps.versions.outputs.should_sync == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          SYNC_BRANCH: ${{ steps.versions.outputs.sync_branch }}
        run: |
          set -euo pipefail
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${SYNC_BRANCH}" --force-with-lease

      - name: Dispatch validation build
        if: ${{ steps.versions.outputs.should_sync == 'true' }}
        id: dispatch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SYNC_BRANCH: ${{ steps.versions.outputs.sync_branch }}
        run: |
          set -euo pipefail
          dispatched_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          gh workflow run build.yml \
            --ref main \
            -f source_ref="${SYNC_BRANCH}" \
            -f publish_to_release=false

          run_id=""
          for _ in $(seq 1 30); do
            run_id="$(
              gh run list \
                --workflow build.yml \
                --event workflow_dispatch \
                --limit 10 \
                --json databaseId,createdAt \
                --jq "map(select(.createdAt >= \"${dispatched_at}\"))[0].databaseId"
            )"
            if [[ -n "${run_id}" && "${run_id}" != "null" ]]; then
              break
            fi
            sleep 10
          done

          if [[ -z "${run_id}" || "${run_id}" == "null" ]]; then
            echo "Unable to resolve the validation run id." >&2
            exit 1
          fi

          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"
          echo "run_url=https://github.com/${GITHUB_REPOSITORY}/actions/runs/${run_id}" >> "$GITHUB_OUTPUT"

      - name: Create or update pull request
        if: ${{ steps.versions.outputs.should_sync == 'true' && steps.branch.outputs.has_changes == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_TAG: ${{ steps.versions.outputs.current_tag }}
          TARGET_TAG: ${{ steps.versions.outputs.target_tag }}
          SYNC_BRANCH: ${{ steps.versions.outputs.sync_branch }}
          RUN_URL: ${{ steps.dispatch.outputs.run_url }}
        run: |
          set -euo pipefail

          body_file="$(mktemp)"
          {
            printf '%s\n' "Automated HAOS sync candidate for ${TARGET_TAG}."
            printf '\n'
            printf '%s\n' "Current main HAOS tag: ${CURRENT_TAG:-unversioned}"
            printf '%s\n' "Proposed HAOS tag: ${TARGET_TAG}"
            printf '%s\n' "Validate run: ${RUN_URL}"
            printf '\n'
            printf '%s\n' "Merge this PR only after the validate build succeeds and any required Mixtile Edge 2 adjustments are applied."
          } > "${body_file}"

          existing_pr="$(gh pr list --base main --head "${SYNC_BRANCH}" --state open --json number --jq '.[0].number')"
          if [[ -n "${existing_pr}" && "${existing_pr}" != "null" ]]; then
            gh pr edit "${existing_pr}" \
              --title "Sync HAOS ${TARGET_TAG}" \
              --body-file "${body_file}"
          else
            gh pr create \
              --base main \
              --head "${SYNC_BRANCH}" \
              --title "Sync HAOS ${TARGET_TAG}" \
              --body-file "${body_file}"
          fi

      - name: Write summary
        if: always()
        run: |
          {
            echo "# HAOS sync summary"
            echo ""
            echo "- Current main tag: \`${{ steps.versions.outputs.current_tag || 'unversioned' }}\`"
            echo "- Target tag: \`${{ steps.versions.outputs.target_tag }}\`"
            echo "- Sync branch: \`${{ steps.versions.outputs.sync_branch }}\`"
            echo "- Triggered sync: \`${{ steps.versions.outputs.should_sync }}\`"
            echo "- Validate run: \`${{ steps.dispatch.outputs.run_url || 'n/a' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

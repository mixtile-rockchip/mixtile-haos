name: Sync latest HAOS release
run-name: >-
  ${{
    inputs.version != '' &&
    format('Sync HAOS {0}', inputs.version) ||
    'Sync HAOS latest'
  }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: Override upstream HAOS version to sync; empty means latest stable release
        required: false
        type: string
        default: ""
      force:
        description: Force running sync even when main is already pinned to the target release
        required: true
        type: boolean
        default: false
  schedule:
    - cron: "25 3 * * *"

jobs:
  sync:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
          submodules: recursive

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve current and target versions
        id: versions
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
          FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail

          git -C haos fetch --tags --force origin

          current_tag="$(git -C haos describe --tags --exact-match 2>/dev/null || true)"
          if [[ -n "${INPUT_VERSION}" ]]; then
            target_tag="${INPUT_VERSION}"
          else
            target_tag="$(gh api repos/home-assistant/operating-system/releases/latest --jq '.tag_name')"
          fi

          if [[ ! "${target_tag}" =~ ^[0-9]+\.[0-9]+$ ]]; then
            echo "Only stable HAOS releases are supported for sync: ${target_tag}." >&2
            exit 1
          fi

          should_sync="false"
          if [[ "${FORCE}" == "true" || "${current_tag}" != "${target_tag}" ]]; then
            should_sync="true"
          fi

          echo "current_tag=${current_tag}" >> "$GITHUB_OUTPUT"
          echo "target_tag=${target_tag}" >> "$GITHUB_OUTPUT"
          echo "should_sync=${should_sync}" >> "$GITHUB_OUTPUT"

      - name: Update main to target tag
        if: ${{ steps.versions.outputs.should_sync == 'true' }}
        id: sync
        shell: bash
        env:
          TARGET_TAG: ${{ steps.versions.outputs.target_tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git switch main
          git -C haos fetch --tags --force origin
          git -C haos checkout "${TARGET_TAG}"
          git add haos

          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "Sync HAOS ${TARGET_TAG}"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:main"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Write summary
        if: always()
        run: |
          {
            echo "# HAOS sync summary"
            echo ""
            echo "- Current main tag: \`${{ steps.versions.outputs.current_tag || 'unversioned' }}\`"
            echo "- Target tag: \`${{ steps.versions.outputs.target_tag }}\`"
            echo "- Triggered sync: \`${{ steps.versions.outputs.should_sync }}\`"
            echo "- Main updated: \`${{ steps.sync.outputs.has_changes || 'false' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

name: Publish release
run-name: Publish ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Source ref to publish (main or port/<version>)
        required: true
        type: string
      version:
        description: Stable HAOS version pinned in source/haos
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-22.04
    permissions:
      actions: write
      contents: write
    steps:
      - name: Checkout control repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0
          path: source
          persist-credentials: false
          submodules: recursive

      - name: Validate source version
        id: source
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+$ ]]; then
            echo "Only stable HAOS release versions can be published: ${VERSION}." >&2
            exit 1
          fi

          git -C source/haos fetch --tags --force origin

          haos_version="$(git -C source/haos describe --tags --exact-match 2>/dev/null || true)"
          if [[ "${haos_version}" != "${VERSION}" ]]; then
            echo "source/haos is pinned to ${haos_version}, expected ${VERSION}." >&2
            exit 1
          fi

          source_sha="$(git -C source rev-parse HEAD)"

          echo "source_sha=${source_sha}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create tag if missing
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.source.outputs.release_tag }}
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
        run: |
          set -euo pipefail

          existing_sha="$(git ls-remote --tags "https://github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${RELEASE_TAG}" | awk '{print $1}')"
          if [[ -n "${existing_sha}" ]]; then
            if [[ "${existing_sha}" != "${SOURCE_SHA}" ]]; then
              echo "Tag ${RELEASE_TAG} already exists at ${existing_sha}, expected ${SOURCE_SHA}." >&2
              exit 1
            fi
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${RELEASE_TAG}" "${SOURCE_SHA}"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${RELEASE_TAG}"

      - name: Create or update release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_REF: ${{ inputs.source_ref }}
          VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ steps.source.outputs.release_tag }}
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
        run: |
          set -euo pipefail

          notes_file="$(mktemp)"
          {
            printf '%s\n' "Home Assistant OS ${VERSION} for Mixtile Edge 2."
            printf '\n'
            printf '%s\n' "Source ref: ${SOURCE_REF}"
            printf '%s\n' "Source commit: ${SOURCE_SHA}"
          } > "${notes_file}"

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "Mixtile Edge 2 HAOS ${VERSION}" \
              --notes-file "${notes_file}"
          else
            gh release create "${RELEASE_TAG}" \
              --verify-tag \
              --target "${SOURCE_SHA}" \
              --title "Mixtile Edge 2 HAOS ${VERSION}" \
              --notes-file "${notes_file}"
          fi

          echo "release_url=$(gh release view "${RELEASE_TAG}" --json url --jq '.url')" >> "$GITHUB_OUTPUT"

      - name: Dispatch release build
        id: dispatch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.source.outputs.release_tag }}
        run: |
          set -euo pipefail
          dispatched_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          expected_title="Build ${RELEASE_TAG}"

          gh workflow run build.yml \
            --ref main \
            -f source_ref="${RELEASE_TAG}" \
            -f publish_to_release=true \
            -f release_tag="${RELEASE_TAG}"

          run_id=""
          for _ in $(seq 1 30); do
            run_id="$(
              gh run list \
                --workflow build.yml \
                --event workflow_dispatch \
                --limit 30 \
                --json databaseId,createdAt,displayTitle \
                | jq -r --arg dispatched_at "${dispatched_at}" --arg expected_title "${expected_title}" '
                    map(select(.createdAt >= $dispatched_at and .displayTitle == $expected_title))[0].databaseId // empty
                  '
            )"
            if [[ -n "${run_id}" && "${run_id}" != "null" ]]; then
              break
            fi
            sleep 10
          done

          if [[ -z "${run_id}" || "${run_id}" == "null" ]]; then
            echo "Unable to resolve the release build run id." >&2
            exit 1
          fi

          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"

      - name: Wait for release build result
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.dispatch.outputs.run_id }}
        run: |
          set -euo pipefail

          for _ in $(seq 1 120); do
            run_json="$(gh run view "${RUN_ID}" --json status,conclusion)"
            status="$(jq -r '.status' <<<"${run_json}")"
            conclusion="$(jq -r '.conclusion // empty' <<<"${run_json}")"

            if [[ "${status}" == "completed" ]]; then
              if [[ "${conclusion}" == "success" ]]; then
                exit 0
              fi

              echo "Release build ${RUN_ID} completed with conclusion=${conclusion}." >&2
              exit 1
            fi

            sleep 30
          done

          echo "Timed out waiting for release build ${RUN_ID}." >&2
          exit 1

      - name: Delete temporary port branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          set -euo pipefail

          if [[ "${SOURCE_REF}" != port/* ]]; then
            exit 0
          fi

          if git ls-remote --exit-code --heads "https://github.com/${GITHUB_REPOSITORY}.git" "${SOURCE_REF}" >/dev/null 2>&1; then
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" ":refs/heads/${SOURCE_REF}"
          fi

      - name: Write summary
        if: always()
        run: |
          {
            echo "# Release summary"
            echo ""
            echo "- Source ref: \`${{ inputs.source_ref }}\`"
            echo "- Source SHA: \`${{ steps.source.outputs.source_sha }}\`"
            echo "- Release tag: \`${{ steps.source.outputs.release_tag }}\`"
            echo "- Release URL: \`${{ steps.release.outputs.release_url || 'n/a' }}\`"
            echo "- Build run id: \`${{ steps.dispatch.outputs.run_id || 'n/a' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

name: Finalize release

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Source ref used to prepare the draft release
        required: true
        type: string
      version:
        description: HAOS version for the release
        required: true
        type: string
      revision:
        description: Release revision number
        required: true
        type: string
        default: "1"

jobs:
  finalize:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout control repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Validate finalize inputs
        id: inputs
        shell: bash
        env:
          SOURCE_REF: ${{ inputs.source_ref }}
          VERSION: ${{ inputs.version }}
          REVISION: ${{ inputs.revision }}
        run: |
          set -euo pipefail

          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+$ ]]; then
            echo "Only stable HAOS release versions can be finalized: ${VERSION}." >&2
            exit 1
          fi

          if [[ "${SOURCE_REF}" == port/* && "${SOURCE_REF}" != "port/${VERSION}" ]]; then
            echo "source_ref ${SOURCE_REF} does not match version ${VERSION}." >&2
            exit 1
          fi

          echo "release_tag=mixtile-haos-${VERSION}-r${REVISION}" >> "$GITHUB_OUTPUT"

      - name: Validate draft release assets
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.inputs.outputs.release_tag }}
        run: |
          set -euo pipefail

          release_json="$(gh release view "${RELEASE_TAG}" --json url,isDraft,assets)"
          release_url="$(jq -r '.url' <<<"${release_json}")"
          is_draft="$(jq -r '.isDraft' <<<"${release_json}")"
          has_img="$(jq '[.assets[].name | select(endswith(".img.xz"))] | length > 0' <<<"${release_json}")"
          has_raucb="$(jq '[.assets[].name | select(endswith(".raucb"))] | length > 0' <<<"${release_json}")"

          if [[ "${has_img}" != "true" || "${has_raucb}" != "true" ]]; then
            echo "Release ${RELEASE_TAG} does not contain both .img.xz and .raucb assets." >&2
            exit 1
          fi

          echo "release_url=${release_url}" >> "$GITHUB_OUTPUT"
          echo "is_draft=${is_draft}" >> "$GITHUB_OUTPUT"

      - name: Publish draft release
        if: ${{ steps.release.outputs.is_draft == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.inputs.outputs.release_tag }}
        run: |
          set -euo pipefail
          gh release edit "${RELEASE_TAG}" --draft=false

      - name: Delete temporary port branch
        id: cleanup
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          set -euo pipefail

          if [[ "${SOURCE_REF}" != port/* ]]; then
            echo "deleted_branch=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git ls-remote --exit-code --heads "https://github.com/${GITHUB_REPOSITORY}.git" "${SOURCE_REF}" >/dev/null 2>&1; then
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" ":refs/heads/${SOURCE_REF}"
            echo "deleted_branch=${SOURCE_REF}" >> "$GITHUB_OUTPUT"
          else
            echo "deleted_branch=" >> "$GITHUB_OUTPUT"
          fi

      - name: Write summary
        if: always()
        run: |
          {
            echo "# Finalize release summary"
            echo ""
            echo "- Release tag: \`${{ steps.inputs.outputs.release_tag }}\`"
            echo "- Release URL: \`${{ steps.release.outputs.release_url || 'n/a' }}\`"
            echo "- Draft before finalize: \`${{ steps.release.outputs.is_draft || 'n/a' }}\`"
            echo "- Deleted port branch: \`${{ steps.cleanup.outputs.deleted_branch || 'none' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

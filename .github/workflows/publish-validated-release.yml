name: Publish validated release

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Validated git ref to publish (main or port/<version>)
        required: true
        type: string
      version:
        description: HAOS version pinned in haos/
        required: true
        type: choice
        options:
          - "11.5"
          - "12.4"
          - "13.2"
          - "14.2"
          - "15.2"
          - "16.3"
          - "17.1"
      revision:
        description: Release revision number for this HAOS version
        required: true
        type: string
        default: "1"

jobs:
  publish:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Validate source version
        id: source
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          haos_version="$(git -C haos describe --tags --exact-match 2>/dev/null || true)"
          if [[ "${haos_version}" != "${VERSION}" ]]; then
            echo "haos/ is pinned to ${haos_version}, expected ${VERSION}." >&2
            exit 1
          fi

          source_sha="$(git rev-parse HEAD)"
          release_tag="mixtile-haos-${VERSION}-r${{ inputs.revision }}"
          echo "source_sha=${source_sha}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Create tag if missing
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.source.outputs.release_tag }}
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          existing_sha="$(git ls-remote --tags "https://github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${RELEASE_TAG}" | awk '{print $1}')"
          if [[ -n "${existing_sha}" ]]; then
            if [[ "${existing_sha}" != "${SOURCE_SHA}" ]]; then
              echo "Tag ${RELEASE_TAG} already exists at ${existing_sha}, expected ${SOURCE_SHA}." >&2
              exit 1
            fi
            echo "Tag ${RELEASE_TAG} already exists at the expected commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${RELEASE_TAG}" "${SOURCE_SHA}"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${RELEASE_TAG}"

      - name: Create published release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          REVISION: ${{ inputs.revision }}
          RELEASE_TAG: ${{ steps.source.outputs.release_tag }}
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "GitHub Release ${RELEASE_TAG} already exists." >&2
            exit 1
          fi

          notes_file="$(mktemp)"
          cat > "${notes_file}" <<EOF
          Home Assistant OS ${VERSION} for Mixtile Edge 2.

          Source ref: ${{ inputs.git_ref }}
          Source commit: ${SOURCE_SHA}

          Publishing this release triggers the official-style build workflow, which uploads \`.img.xz\` and \`.raucb\` assets to this release.
          EOF

          gh release create "${RELEASE_TAG}" \
            --verify-tag \
            --title "Mixtile HAOS ${VERSION} r${REVISION}" \
            --notes-file "${notes_file}"

      - name: Write summary
        run: |
          {
            echo "# Release publication summary"
            echo ""
            echo "- Source ref: \`${{ inputs.git_ref }}\`"
            echo "- Source SHA: \`${{ steps.source.outputs.source_sha }}\`"
            echo "- Release tag: \`${{ steps.source.outputs.release_tag }}\`"
            echo "- Next step: \`Build Mixtile Edge 2\` will start automatically from the release.published event"
          } >> "$GITHUB_STEP_SUMMARY"
